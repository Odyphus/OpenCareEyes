name: 功能建议
description: 说明问题和期望的用户体验
title: "[Feature] "
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请描述使用场景，而不只是功能名称。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
  - type: checkboxes
    id: scope
    attributes:
      label: 范围确认
      options:
        - label: 该建议不依赖账号、云同步或遥测，也不包含未经证实的医疗效果承诺。
          required: true
