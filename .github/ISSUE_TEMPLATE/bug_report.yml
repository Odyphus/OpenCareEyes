name: 缺陷报告
description: 报告可稳定复现的 OpenCareEyes 问题
title: "[Bug] "
body:
  - type: input
    id: version
    attributes:
      label: OpenCareEyes 版本
      placeholder: 0.5.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Windows 与显示环境
      description: Windows 版本、显示器数量、缩放比例、HDR/远程桌面情况
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果与错误提示
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我已从截图和诊断信息中删除用户名、路径、位置等个人信息。
          required: true
